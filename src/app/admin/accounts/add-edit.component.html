<div class="d-flex justify-content-between mb-3">
    <h2>{{ isAddMode ? 'Add Account' : 'Edit Account' }}</h2>
    <a routerLink="/admin/accounts" class="btn btn-secondary">Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" [(ngModel)]="account.firstName" name="firstName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" [(ngModel)]="account.lastName" name="lastName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" [(ngModel)]="account.email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select [(ngModel)]="account.role" name="role" class="form-select">
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="loading">
                {{ isAddMode ? 'Create' : 'Update' }}
            </button>
        </form>
    </div>
</div>
