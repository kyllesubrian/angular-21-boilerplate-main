<div class="page-container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Account Management</h1>
            <p class="page-subtitle">Manage all registered accounts</p>
        </div>
        <a routerLink="add" class="btn-action btn-action-primary">+ Create Account</a>
    </div>
    <div class="table-card">
        <table class="formal-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let account of accounts">
                    <td>{{account.title}} {{account.firstName}} {{account.lastName}}</td>
                    <td>{{account.email}}</td>
                    <td>
                        <span [class]="account.role === 'Admin' ? 'badge-admin' : 'badge-user'">
                            {{account.role}}
                        </span>
                    </td>
                    <td>
                        <span [class]="account.isVerified ? 'badge-active' : 'badge-pending'">
                            {{account.isVerified ? 'Verified' : 'Pending'}}
                        </span>
                    </td>
                    <td>
                        <a routerLink="edit/{{account.id}}" class="btn-table btn-table-edit">Edit</a>
                        <button (click)="deleteAccount(account.id)" class="btn-table btn-table-delete" [disabled]="account.isDeleting">
                            <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm"></span>
                            <span *ngIf="!account.isDeleting">Delete</span>
                        </button>
                    </td>
                </tr>
                <tr *ngIf="Loading">
                    <td colspan="5" class="text-center py-4">
                        <span class="spinner-border spinner-border-lg"></span>
                    </td>
                </tr>
                <tr *ngIf="!Loading && accounts.length === 0">
                    <td colspan="5" class="text-center py-4 text-muted">
                        No accounts found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
