<div class="page-hero py-5">

            <h1 class="display-5 mb-3">Hi {{ fullName }}</h1>
            <p class="lead mb-4">You are logged in as {{ account?.email }}</p>
            <div class="d-flex justify-content-center gap-3 flex-wrap mb-4">

            <p class="text-muted mb-1">Registered user: {{ fullName }}</p>

        </div>
    </div>
</div>
