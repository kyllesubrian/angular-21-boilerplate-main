<div class="login-box">
  <div class="login-header">
    <h2>Login</h2>
    <p>Enter your email and password to continue.</p>
  </div>

  <form class="login-form" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <label>Email</label>
      <input class="form-control" type="email" [(ngModel)]="email" name="email" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input class="form-control" type="password" [(ngModel)]="password" name="password" required>
    </div>
    <button type="submit" class="btn-login">Login</button>
  </form>

  <div class="login-links">
    <a routerLink="/account/register">Register</a>
    <span class="login-separator">&middot;</span>
    <a routerLink="/account/forgot-password">Forgot Password?</a>
  </div>
</div>
