<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Login</h3>
            </div>
            <div class="card-body">
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" formControlName="email" class="form-control" [class.is-invalid]="submitted && f['email'].errors">
                        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                            <div *ngIf="f['email'].errors['required']">Email is required</div>
                            <div *ngIf="f['email'].errors['email']">Valid email is required</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" formControlName="password" class="form-control" [class.is-invalid]="submitted && f['password'].errors">
                        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">Password is required</div>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                            Login
                        </button>
                    </div>
                    <div class="text-center">
                        <a routerLink="/account/forgot-password">Forgot Password?</a>
                        <span class="mx-2">|</span>
                        <a routerLink="/account/register">Create an Account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
