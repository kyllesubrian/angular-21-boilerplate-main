<div class="login-box">
  <div class="login-header">
    <h2>Login</h2>
  </div>

  <form class="login-form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" [(ngModel)]="email" name="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" [(ngModel)]="password" name="password" required>
    </div>
    <div class="d-flex align-items-center justify-content-between mt-3">
      <div class="d-flex align-items-center gap-3">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <span *ngIf="loading">Logging in...</span>
          <span *ngIf="!loading">Login</span>
        </button>
        <a routerLink="/account/register" class="text-decoration-none">Register</a>
      </div>
      <a routerLink="/account/forgot-password" class="text-decoration-none">Forgot Password?</a>
    </div>
  </form>
</div>
