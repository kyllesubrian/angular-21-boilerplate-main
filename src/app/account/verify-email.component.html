<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Verify Email</h3>
            </div>
            <div class="card-body text-center">
                <div *ngIf="verifying" class="text-center">
                    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Verifying...</span>
                    </div>
                    <p class="mt-3">Verifying your email...</p>
                </div>
                <div *ngIf="!verifying && verified">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 48px;"></i>
                    <h4 class="mt-3 text-success">Verification Successful!</h4>
                    <p>Your email has been verified. You can now login to your account.</p>
                    <a routerLink="/account/login" class="btn btn-primary mt-3">Go to Login</a>
                </div>
                <div *ngIf="!verifying && !verified && error" class="text-center">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size: 48px;"></i>
                    <h4 class="mt-3 text-danger">Verification Failed</h4>
                    <p>{{ error }}</p>
                    <a routerLink="/account/forgot-password" class="btn btn-primary mt-3">Reset Password</a>
                </div>
            </div>
        </div>
    </div>
</div>
