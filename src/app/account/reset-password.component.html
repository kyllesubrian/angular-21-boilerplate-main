<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Reset Password</h3>
            </div>
            <div class="card-body">
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" formControlName="password" class="form-control" [class.is-invalid]="submitted && f['password'].errors">
                        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                            <div *ngIf="f['password'].errors['required']">Password is required</div>
                            <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" formControlName="confirmPassword" class="form-control" [class.is-invalid]="submitted && f['confirmPassword'].errors">
                        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                            <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
                            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                            Reset Password
                        </button>
                    </div>
                    <div class="text-center">
                        <a routerLink="/account/login">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
