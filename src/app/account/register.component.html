<div class="register-box simple-register">
  <div class="register-header">
    <h2>Register</h2>
    <p>Create your account and get started.</p>
  </div>

  <form class="register-form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-field">
        <label>First Name</label>
        <input class="form-control" type="text" [(ngModel)]="firstName" name="firstName" required>
      </div>
      <div class="form-field">
        <label>Last Name</label>
        <input class="form-control" type="text" [(ngModel)]="lastName" name="lastName" required>
      </div>
    </div>

    <div class="form-field">
      <label>Email Address</label>
      <input class="form-control" type="email" [(ngModel)]="email" name="email" required>
    </div>

    <div class="form-field">
      <label>Password</label>
      <input class="form-control" type="password" [(ngModel)]="password" name="password" required>
    </div>

    <div class="form-field">
      <label>Confirm Password</label>
      <input class="form-control" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
    </div>

    <div class="form-field form-check">
      <input
        type="checkbox"
        id="acceptTerms"
        [(ngModel)]="acceptTerms"
        name="acceptTerms"
        class="form-check-input"
        [class.is-invalid]="submitted && !acceptTerms"
      />
      <label for="acceptTerms" class="form-check-label">
        I accept the <a href="#">Terms and Conditions</a>
      </label>
      <div *ngIf="submitted && !acceptTerms" class="invalid-feedback d-block">
        You must accept the Terms and Conditions
      </div>
    </div>

    <button type="submit" class="btn-register" [disabled]="loading">
      <span *ngIf="loading">Registering...</span>
      <span *ngIf="!loading">Register</span>
    </button>
  </form>

  <div class="links simple-links">
    <a routerLink="/account/login">Already have an account? Login</a>
  </div>
</div>
