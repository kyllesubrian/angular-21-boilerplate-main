<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Register</h3>
            </div>
            <div class="card-body">
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <select formControlName="title" class="form-select" [class.is-invalid]="submitted && f['title'].errors">
                            <option value="">Select Title</option>
                            <option value="Mr">Mr</option>
                            <option value="Mrs">Mrs</option>
                            <option value="Miss">Miss</option>
                            <option value="Ms">Ms</option>
                            <option value="Dr">Dr</option>
                        </select>
                        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">Title is required</div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" formControlName="firstName" class="form-control" [class.is-invalid]="submitted && f['firstName'].errors">
                            <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">First Name is required</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" formControlName="lastName" class="form-control" [class.is-invalid]="submitted && f['lastName'].errors">
                            <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">Last Name is required</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" formControlName="email" class="form-control" [class.is-invalid]="submitted && f['email'].errors">
                        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                            <div *ngIf="f['email'].errors['required']">Email is required</div>
                            <div *ngIf="f['email'].errors['email']">Valid email is required</div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" formControlName="password" class="form-control" [class.is-invalid]="submitted && f['password'].errors">
                            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                                <div *ngIf="f['password'].errors['required']">Password is required</div>
                                <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" formControlName="confirmPassword" class="form-control" [class.is-invalid]="submitted && f['confirmPassword'].errors">
                            <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                                <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
                                <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" formControlName="acceptTerms" class="form-check-input" [class.is-invalid]="submitted && f['acceptTerms'].errors">
                        <label class="form-check-label">I accept the Terms and Conditions</label>
                        <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback">You must accept Terms and Conditions</div>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                            Register
                        </button>
                    </div>
                    <div class="text-center">
                        <a routerLink="/account/login">Already have an account?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
