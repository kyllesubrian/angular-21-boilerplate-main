<div class="register-box simple-register">
  <h2>Register</h2>
  <form (ngSubmit)="onSubmit()" class="register-form">
    <div class="form-row">
      <div class="form-field">
        <label>First Name</label>
        <input class="form-control" type="text" [(ngModel)]="firstName" name="firstName" required>
      </div>
      <div class="form-field">
        <label>Last Name</label>
        <input class="form-control" type="text" [(ngModel)]="lastName" name="lastName" required>
      </div>
    </div>

    <div class="form-field">
      <label>Email Address</label>
      <input class="form-control" type="email" [(ngModel)]="email" name="email" required>
    </div>

    <div class="form-field">
      <label>Password</label>
      <input class="form-control" type="password" [(ngModel)]="password" name="password" required>
    </div>

    <div class="form-field">
      <label>Confirm Password</label>
      <input class="form-control" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
    </div>

    <button type="submit" class="btn-register">Register</button>
  </form>
  <div class="links simple-links">
    <a routerLink="/account/login">Already have an account? Login</a>
  </div>
</div>
